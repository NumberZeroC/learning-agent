agents:
  core_skill_worker:
    description: 负责第 3 层（核心能力层）知识生成
    enabled: true
    hot_reload: true
    layer: 3
    llm_config:
      max_tokens: 4000
      temperature: 0.7
      top_p: 0.9
    model: qwen3.5-plus
    provider: dashscope
    role: Agent 核心能力专家
    system_prompt: 你是一位 Agent 核心能力专家，深入理解任务规划（CoT、ToT、ReAct）、工具调用（Function Calling）、记忆管理、多
      Agent 协作等核心技术。回答时提供清晰的原理讲解和可运行的代码实现。
    tools:
    - web_search
    - code_executor
    - diagram_generator
  engineering_worker:
    description: 负责第 4 层（工程实践层）知识生成
    enabled: true
    hot_reload: true
    layer: 4
    llm_config:
      max_tokens: 4000
      temperature: 0.7
      top_p: 0.9
    model: qwen3.5-plus
    provider: dashscope
    role: AI 工程实践专家
    system_prompt: 你是一位 AI 工程实践专家，有丰富的 Agent 系统开发和运维经验。回答时分享真实项目案例、性能优化技巧、部署运维最佳实践，帮助学习者掌握生产级开发能力。
    tools:
    - web_search
    - file_read
    - file_write
    - case_study_loader
  interview_worker:
    description: 负责第 5 层（面试准备层）知识生成
    enabled: true
    hot_reload: true
    layer: 5
    llm_config:
      max_tokens: 4000
      temperature: 0.7
      top_p: 0.9
    model: qwen3.5-plus
    provider: dashscope
    role: AI 面试准备专家
    system_prompt: 你是一位 AI 面试准备专家，熟悉 AI/Agent 岗位的面试流程和常见问题。回答时提供高频面试题、详细解答思路、面试技巧，帮助学习者有效准备技术面试。
    tools:
    - web_search
    - question_generator
    - mock_interview
  master_agent:
    description: 负责任务分解、协调子 Agent、汇总结果
    enabled: true
    hot_reload: true
    layer: 0
    llm_config:
      max_tokens: 4000
      temperature: 0.7
      top_p: 0.9
    model: qwen3.5-plus
    provider: dashscope
    role: 学习路线总架构师
    system_prompt: 你是学习路线总架构师，负责将用户的学习需求分解为系统化的学习路线。协调各专业领域专家，确保学习内容完整、循序渐进、实用有效。
    tools:
    - task_decomposition
    - progress_tracking
    - quality_check
    - result_aggregation
  tech_stack_worker:
    description: 负责第 2 层（技术栈层）知识生成
    enabled: true
    hot_reload: true
    layer: 2
    llm_config:
      max_tokens: 4000
      temperature: 0.7
      top_p: 0.9
    model: qwen3.5-plus
    provider: dashscope
    role: AI 技术栈专家
    system_prompt: 你是一位 AI 技术栈专家，精通 Python 编程、Agent 开发框架（LangChain、AutoGen、LlamaIndex）、向量数据库等技术。回答时提供实用的代码示例和最佳实践，帮助学习者掌握实际开发技能。
    tools:
    - web_search
    - code_executor
    - file_read
    - file_write
  theory_worker:
    description: 负责第 1 层（基础理论层）知识生成
    enabled: true
    hot_reload: true
    layer: 1
    llm_config:
      max_tokens: 4000
      temperature: 0.7
      top_p: 0.9
    model: qwen3.5-plus
    provider: dashscope
    role: AI 理论基础专家
    system_prompt: 你是一位 AI 理论基础专家，擅长用通俗易懂的方式讲解机器学习、深度学习、大语言模型和 Agent 相关的基础理论知识。回答时注重准确性和系统性，让学习者能够理解核心概念和原理。
    tools:
    - web_search
    - file_read
    - knowledge_validator
  topic_classifier:
    description: 分析主题内容，智能选择最合适的生成 Agent
    enabled: true
    hot_reload: true
    layer: 0
    llm_config:
      max_tokens: 1000
      temperature: 0.3
      top_p: 0.9
    model: qwen3.5-plus
    provider: dashscope
    role: 主题分类专家
    system_prompt: '你是主题分类专家。根据用户输入的主题名称和描述，判断最适合生成该主题知识的 Agent 类型。可选的 Agent 类型：theory_worker（基础理论）、tech_stack_worker（技术栈）、core_skill_worker（核心能力）、engineering_worker（工程实践）、interview_worker（面试准备）、faq_worker（FAQ问答）。分析时关注主题关键词，如"算法""原理"属于理论类，"框架""工具"属于技术栈类，"设计""架构"属于核心能力类，"项目""部署"属于工程类，"面试""简历"属于面试类，其他无法明确分类的主题使用 faq_worker。返回格式：{"agent": "xxx_worker", "reason": "分类原因"}'
    tools: []
  faq_worker:
    description: FAQ 层 Agent，用于生成自定义主题知识
    enabled: true
    hot_reload: true
    layer: 6
    llm_config:
      max_tokens: 4000
      temperature: 0.7
      top_p: 0.9
    model: qwen3.5-plus
    provider: dashscope
    role: FAQ 问答专家
    system_prompt: 你是知识体系构建专家，擅长根据用户的详细描述拆解生成系统化的知识点。你必须严格按照用户提供的描述内容来生成知识，将描述中的每个核心概念、术语都拆解为独立的知识点。不要偏离用户描述的主题，不要添加描述中没有提到的无关内容。每个知识点都要有详细解释，包括定义、作用、原理、使用场景等。
    tools: []
  web_chat_agent:
    description: 专门用于 Web 聊天窗口的知识问答 Agent
    enabled: true
    hot_reload: true
    layer: 0
    llm_config:
      max_tokens: 4000
      temperature: 0.7
      top_p: 0.9
    model: qwen3.5-plus
    provider: dashscope
    role: AI 知识问答助手
    system_prompt: 你是 AI 知识问答助手，擅长解答 AI、机器学习、Agent 开发相关的技术问题。回答时用通俗易懂的方式解释概念，提供实用的代码示例。保持友好、专业的态度，鼓励用户探索学习。
global:
  default_model: qwen3.5-plus
  timeout: 120
hot_reload:
  auto_apply: true
  backup_dir: config/backups
  backup_enabled: true
  check_interval: 10
  config_file: config/agent_config.yaml
  enabled: true
  log_changes: true
  log_file: logs/config_changes.log
logging:
  backup_count: 5
  console: true
  file: logs/autogen.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
  max_size: 10485760
performance:
  agent_timeout: 120
  cache:
    backend: memory
    enabled: true
    max_size: 1000
    ttl: 14400
  max_concurrent_agents: 6
providers:
  dashscope:
    api_key_env: DASHSCOPE_API_KEY
    base_url: https://coding.dashscope.aliyuncs.com/v1
    enabled: true
    models:
      qwen3.5-plus:
        description: Qwen3.5-Plus（统一使用）
        max_tokens: 4000
        temperature: 0.7
tools:
  calculator:
    enabled: true
  code_execution:
    enabled: true
    sandbox: true
    timeout: 30
  file_operations:
    allowed_extensions:
    - .txt
    - .md
    - .json
    - .yaml
    - .py
    base_dir: ./data
    enabled: true
  web_search:
    api_key_env: TAVILY_API_KEY
    enabled: true
    max_results: 5
    provider: tavily
