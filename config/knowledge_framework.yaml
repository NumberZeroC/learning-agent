# Agent 开发面试知识体系架构
# 版本：1.0
# 创建日期：2026-04-19
# 
# 说明：
# - 定义 5 层知识架构（基础理论→技术栈→核心能力→工程实践→面试准备）
# - 每层包含若干主题，每个主题有描述和优先级
# - subtopics 由大模型根据主题自动生成，不再硬编码
# - 增加跨层级知识依赖关系生成

name: Agent 开发面试知识体系
version: '1.0'
description: AI Agent 开发岗位面试知识体系，覆盖从基础理论到面试准备的全链路
layers:
- layer: 1
  name: 基础理论层
  agent: theory_worker
  description: 机器学习和深度学习基础理论
  topics:
  - name: 机器学习
    priority: high
  - name: 深度学习
    priority: high
  - name: 大模型原理
    priority: high
  - name: 算法基础
    priority: medium
- layer: 2
  name: 技术栈层
  agent: tech_stack_worker
  description: Agent 开发所需的技术栈和工具
  topics:
  - name: Python 编程
    priority: high
  - name: 开发框架
    priority: high
  - name: 向量数据库
    priority: high
  - name: 接口集成
    priority: medium
- layer: 3
  name: 核心能力层
  agent: core_skill_worker
  description: Agent 核心功能模块与协作能力
  topics:
  - name: 任务规划
    priority: high
  - name: 工具调用
    priority: high
  - name: 记忆机制
    priority: high
  - name: 多智能体
    priority: medium
- layer: 4
  name: 工程实践层
  agent: engineering_worker
  description: 项目落地、优化与部署实践
  topics:
  - name: 项目实战
    priority: high
  - name: 性能优化
    priority: high
  - name: 模型部署
    priority: high
  - name: 评估测试
    priority: medium
- layer: 5
  name: 面试准备层
  agent: interview_worker
  description: 面试算法、系统设计与行为考察
  topics:
  - name: 算法刷题
    priority: high
  - name: 系统设计
    priority: high
  - name: 行为面试
    priority: medium
  - name: 简历优化
    priority: medium
