{% extends "base.html" %}

{% block title %}报告详情 - Stock-Agent 监控平台{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>
        <i class="bi bi-file-earmark-text"></i> 报告详情
    </h2>
    <a href="/reports" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> 返回列表
    </a>
</div>

<!-- 报告内容 -->
<div class="card">
    <div class="card-header">
        <i class="bi bi-file-earmark-text"></i> {{ report_type }} - {{ filename }}
    </div>
    <div class="card-body">
        <div id="report-content" class="report-content">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <p class="mt-3">正在加载报告...</p>
            </div>
        </div>
    </div>
</div>

<style>
.report-content {
    line-height: 1.8;
}
.report-content h1, .report-content h2, .report-content h3 {
    margin-top: 1.5em;
    margin-bottom: 0.5em;
}
.report-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 1em 0;
}
.report-content th, .report-content td {
    border: 1px solid #dee2e6;
    padding: 0.5em;
}
.report-content th {
    background-color: #f8f9fa;
}
</style>

<script>
// 加载 Markdown 报告
fetch(`/data/reports/${{ filename | tojson }}`)
    .then(response => response.text())
    .then(markdown => {
        // 简单的 Markdown 转换（实际应该用 marked.js 等库）
        const html = markdown
            .replace(/^# (.*$)/gim, '<h1>$1</h1>')
            .replace(/^## (.*$)/gim, '<h2>$1</h2>')
            .replace(/^### (.*$)/gim, '<h3>$1</h3>')
            .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
            .replace(/\*(.*)\*/gim, '<em>$1</em>')
            .replace(/\n/gim, '<br>');
        
        document.getElementById('report-content').innerHTML = html;
    })
    .catch(error => {
        document.getElementById('report-content').innerHTML = 
            '<div class="alert alert-danger">报告加载失败：' + error + '</div>';
    });
</script>
{% endblock %}
