<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>链接测试 - Stock-Agent</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>🔗 链接测试页面</h1>
    <p class="lead">点击以下链接测试页面跳转是否正常</p>
    
    <div class="card mt-4">
        <div class="card-header">主要页面</div>
        <div class="card-body">
            <ul class="list-group">
                <li class="list-group-item">
                    <a href="/" class="btn btn-primary">🏠 首页</a>
                    <code>/</code>
                </li>
                <li class="list-group-item">
                    <a href="/reports" class="btn btn-primary">📄 报告列表</a>
                    <code>/reports</code>
                </li>
                <li class="list-group-item">
                    <a href="/dashboard" class="btn btn-primary">📊 数据看板</a>
                    <code>/dashboard</code>
                </li>
                <li class="list-group-item">
                    <a href="/monitor" class="btn btn-primary">👁️ 持仓监控</a>
                    <code>/monitor</code>
                </li>
                <li class="list-group-item">
                    <a href="/settings" class="btn btn-primary">⚙️ 配置管理</a>
                    <code>/settings</code>
                </li>
            </ul>
        </div>
    </div>
    
    <div class="card mt-4">
        <div class="card-header">API 接口</div>
        <div class="card-body">
            <ul class="list-group">
                <li class="list-group-item">
                    <a href="/api/v1/config" class="btn btn-outline-primary" target="_blank">获取配置</a>
                    <code>GET /api/v1/config</code>
                </li>
                <li class="list-group-item">
                    <a href="/api/v1/monitor/stocks" class="btn btn-outline-primary" target="_blank">获取监控</a>
                    <code>GET /api/v1/monitor/stocks</code>
                </li>
                <li class="list-group-item">
                    <a href="/api/v1/stocks/recommend" class="btn btn-outline-primary" target="_blank">获取推荐</a>
                    <code>GET /api/v1/stocks/recommend</code>
                </li>
            </ul>
        </div>
    </div>
    
    <div class="card mt-4">
        <div class="card-header">JavaScript 测试</div>
        <div class="card-body">
            <button class="btn btn-success" onclick="testJS()">测试 JavaScript</button>
            <button class="btn btn-info" onclick="testFetch()">测试 API 连接</button>
            <div id="result" class="mt-3"></div>
        </div>
    </div>
</div>

<script>
function testJS() {
    document.getElementById('result').innerHTML = 
        '<div class="alert alert-success">✅ JavaScript 工作正常！</div>';
    console.log('JavaScript 测试通过');
}

function testFetch() {
    fetch('/api/v1/config')
        .then(response => response.json())
        .then(data => {
            document.getElementById('result').innerHTML = 
                '<div class="alert alert-success">✅ API 连接成功！配置已加载。</div>';
            console.log('API 测试通过:', data);
        })
        .catch(error => {
            document.getElementById('result').innerHTML = 
                '<div class="alert alert-danger">❌ API 连接失败：' + error + '</div>';
        });
}

console.log('页面加载完成，所有链接应该可以正常工作');
</script>
</body>
</html>
