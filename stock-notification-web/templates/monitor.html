{% extends "base.html" %}

{% block title %}持仓监控 - Stock-Agent 监控平台{% endblock %}

{% block content %}
<h2 class="mb-4">
    <i class="bi bi-eye"></i> 今日持仓监控
</h2>

<!-- 日期显示 -->
<div class="alert alert-info mb-3">
    <i class="bi bi-calendar-event"></i>
    <strong>监控日期：</strong><span id="monitorDate" class="ms-2"></span>
    <span class="ms-3 text-muted">(仅展示最新一日数据)</span>
</div>

<!-- 刷新按钮和状态 -->
<div class="mb-3 d-flex justify-content-between align-items-center">
    <div>
        <button class="btn btn-primary" onclick="loadMonitorData()">
            <i class="bi bi-arrow-clockwise"></i> 刷新
        </button>
        <span id="lastUpdate" class="ms-2 text-muted"></span>
    </div>
    <div>
        <span class="badge bg-primary" id="totalStocks">总数：0</span>
        <span class="badge bg-success ms-1" id="buyCount">买入：0</span>
        <span class="badge bg-warning ms-1" id="holdCount">持有：0</span>
        <span class="badge bg-danger ms-1" id="sellCount">卖出：0</span>
    </div>
</div>

<!-- 持仓列表 -->
<div class="card">
    <div class="card-header">
        <i class="bi bi-list-ul"></i> 持仓股票列表
    </div>
    <div class="card-body">
        <div id="loading" class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">加载中...</span>
            </div>
            <p class="mt-2 text-muted">正在加载监控数据...</p>
        </div>
        <div id="error" class="alert alert-danger d-none"></div>
        <table class="table table-hover d-none" id="stockTable">
            <thead>
                <tr>
                    <th>股票</th>
                    <th>板块</th>
                    <th>价格</th>
                    <th>涨跌幅</th>
                    <th>信号</th>
                    <th>得分</th>
                    <th>操作建议</th>
                    <th>风险提示</th>
                </tr>
            </thead>
            <tbody id="stock-table">
            </tbody>
        </table>
        <div id="noData" class="text-center py-4 d-none">
            <i class="bi bi-inbox" style="font-size: 3rem;"></i>
            <p class="mt-2 text-muted">暂无监控数据</p>
        </div>
    </div>
</div>

<!-- 最新报告 -->
<div class="card mt-4">
    <div class="card-header">
        <i class="bi bi-file-earmark-text"></i> 今日监控报告
    </div>
    <div class="card-body" id="latestReport">
        <div class="text-center py-3 text-muted">
            <div class="spinner-border spinner-border-sm" role="status"></div>
            正在加载...
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// 显示监控日期
function showMonitorDate() {
    const today = new Date();
    const dateStr = today.toLocaleDateString('zh-CN', { 
        year: 'numeric', 
        month: '2-digit', 
        day: '2-digit' 
    });
    document.getElementById('monitorDate').textContent = dateStr;
}

// 加载监控数据
async function loadMonitorData() {
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const table = document.getElementById('stockTable');
    const noData = document.getElementById('noData');
    const tbody = document.getElementById('stock-table');
    const lastUpdate = document.getElementById('lastUpdate');
    
    try {
        loading.classList.remove('d-none');
        error.classList.add('d-none');
        table.classList.add('d-none');
        noData.classList.add('d-none');
        
        const response = await fetch('/api/v1/monitor/stocks');
        const result = await response.json();
        
        if (result.code !== 200) {
            throw new Error(result.message || '加载失败');
        }
        
        const data = result.data;
        
        // 更新摘要
        document.getElementById('totalStocks').textContent = `总数：${data.total}`;
        document.getElementById('buyCount').textContent = `买入：${data.summary.buy}`;
        document.getElementById('holdCount').textContent = `持有：${data.summary.hold}`;
        document.getElementById('sellCount').textContent = `卖出：${data.summary.sell}`;
        
        // 渲染表格
        if (data.stocks.length === 0) {
            noData.classList.remove('d-none');
        } else {
            let html = '';
            data.stocks.forEach(stock => {
                const changeClass = stock.change_pct >= 0 ? 'text-danger' : 'text-success';
                const changeSign = stock.change_pct >= 0 ? '+' : '';
                const signalClass = getSignalClass(stock.signal);
                
                html += `
                    <tr>
                        <td>
                            <strong>${stock.name}</strong><br>
                            <small class="text-muted">${stock.code}</small>
                        </td>
                        <td>${stock.sector || '-'}</td>
                        <td>¥${stock.price?.toFixed(2) || '-'}</td>
                        <td class="${changeClass}">
                            ${changeSign}${stock.change_pct?.toFixed(2) || 0}%
                        </td>
                        <td>
                            <span class="badge ${signalClass}">
                                ${getSignalText(stock.signal)}
                            </span>
                        </td>
                        <td>${stock.score?.toFixed(1) || '-'}</td>
                        <td>${stock.action || '-'}</td>
                        <td>
                            ${stock.risk_alerts?.length > 0 
                                ? stock.risk_alerts.map(r => `<span class="badge bg-warning me-1">${r}</span>`).join('')
                                : '-'}
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
            table.classList.remove('d-none');
        }
        
        // 更新时间
        const now = new Date();
        lastUpdate.textContent = `最后更新：${now.toLocaleTimeString('zh-CN')}`;
        
        // 加载最新报告
        loadLatestReport();
        
    } catch (err) {
        console.error('加载失败:', err);
        error.textContent = '加载失败：' + err.message;
        error.classList.remove('d-none');
    } finally {
        loading.classList.add('d-none');
    }
}

// 获取信号样式
function getSignalClass(signal) {
    const mapping = {
        'STRONG_BUY': 'bg-success',
        'BUY': 'bg-success',
        'HOLD': 'bg-warning',
        'SELL': 'bg-danger',
        'STRONG_SELL': 'bg-danger'
    };
    return mapping[signal] || 'bg-secondary';
}

// 获取信号文本
function getSignalText(signal) {
    const mapping = {
        'STRONG_BUY': '买入',
        'BUY': '买入',
        'HOLD': '持有',
        'SELL': '卖出',
        'STRONG_SELL': '卖出'
    };
    return mapping[signal] || signal;
}

// 加载最新报告
async function loadLatestReport() {
    const container = document.getElementById('latestReport');
    
    try {
        const response = await fetch('/api/v1/reports?type=monitor');
        const result = await response.json();
        
        if (result.code === 200 && result.data.length > 0) {
            const report = result.data[0];
            const date = new Date(report.created_at);
            const dateStr = date.toLocaleString('zh-CN', { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            // 提取文件名
            const filename = report.filename || report.path.replace('/data/reports/', '').replace('/data/reports/monitor/', '');
            
            container.innerHTML = `
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <i class="bi ${report.icon}"></i>
                        <strong>${report.title}</strong>
                        <p class="mb-0 text-muted small">${report.description}</p>
                    </div>
                    <div class="text-end">
                        <div class="text-muted small">${dateStr}</div>
                        <a href="/read/${filename}" class="btn btn-sm btn-outline-primary mt-1">
                            <i class="bi bi-file-earmark-text"></i> 在线阅读
                        </a>
                    </div>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="text-center text-muted">
                    <i class="bi bi-inbox"></i> 暂无监控报告
                </div>
            `;
        }
    } catch (err) {
        container.innerHTML = `
            <div class="text-center text-muted">
                <i class="bi bi-exclamation-circle"></i> 加载报告失败
            </div>
        `;
    }
}

// 页面加载时显示日期并获取数据
showMonitorDate();
loadMonitorData();

// 每 30 秒自动刷新
setInterval(loadMonitorData, 30000);
</script>
{% endblock %}
