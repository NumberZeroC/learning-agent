# Stock-Agent 回测配置文件

# 策略选择：momentum | value
strategy: momentum

# 回测区间
start_date: '2025-01-01'
end_date: '2026-03-29'

# 初始资金
initial_capital: 1000000

# 策略参数
strategy_params:
  # 动量策略参数
  lookback_period: 20      # 动量回看天数
  holding_period: 5        # 持有天数
  top_n: 10                # 选股数量
  ma_period: 20            # 均线周期
  rsi_upper: 80            # RSI 上限
  rsi_lower: 50            # RSI 下限
  min_volume_ratio: 1.2    # 最小量比

# 交易成本
commission_rate: 0.0003    # 佣金万三
stamp_duty: 0.001          # 印花税千一

# 基准指数
benchmark_code: '000001.SH'  # 上证指数

# 输出配置
output_dir: 'reports'
verbose: true
