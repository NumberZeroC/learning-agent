version: '3.8'

services:
  learning-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learning-agent
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      # 持久化数据
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
      # 挂载环境变量文件（可选）
      - ./.env:/app/.env:ro
    environment:
      - FLASK_ENV=production
      # 从 .env 文件加载
      - LEARNING_AGENT_MASTER_KEY=${LEARNING_AGENT_MASTER_KEY:-}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://coding.dashscope.aliyuncs.com/v1}
    networks:
      - learning-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  learning-network:
    driver: bridge
